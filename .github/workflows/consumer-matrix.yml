name: Consumer Matrix

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Pack tarball
        run: |
          mkdir -p tmp/pack
          npm pack --pack-destination tmp/pack

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: brander-tarball
          path: tmp/pack/*.tgz
          if-no-files-found: error

  consumer:
    needs: pack
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        stack:
          - vite
          - next
          - nuxt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: brander-tarball
          path: tmp/pack

      - name: Run consumer smoke test
        run: |
          TARBALL_PATH="$(ls tmp/pack/*.tgz | head -n 1)"
          export TARBALL="$TARBALL_PATH"
          bash scripts/consumer-smoke.sh "${{ matrix.stack }}"
